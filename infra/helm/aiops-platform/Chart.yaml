apiVersion: v2
name: aiops-platform
description: Enterprise AI Operations Engineer Platform
type: application
version: 1.0.0
appVersion: "1.0.0"

dependencies:
  - name: postgresql
    version: "16.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "20.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: rabbitmq
    version: "15.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: rabbitmq.enabled
