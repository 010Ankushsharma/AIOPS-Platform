apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aiops-platform.fullname" . }}
  labels:
    {{- include "aiops-platform.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "aiops-platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aiops-platform.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api-gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          env:
            - name: ENVIRONMENT
              value: {{ .Values.environment }}
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ollama.baseUrl }}
            - name: OLLAMA_MODEL
              value: {{ .Values.ollama.model }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 5
