apiVersion: v1
kind: ConfigMap
metadata:
  name: aiops-config
  namespace: aiops
data:
  APP_NAME: "AIOps Platform"
  ENVIRONMENT: "production"
  API_PREFIX: "/api/v1"
  REDIS_URL: "redis://redis-master.aiops:6379/0"
  RABBITMQ_URL: "amqp://aiops:password@rabbitmq.aiops:5672/"
  NEO4J_URI: "bolt://neo4j.aiops:7687"
  QDRANT_HOST: "qdrant.aiops"
  QDRANT_PORT: "6333"
  OLLAMA_BASE_URL: "http://ollama.aiops:11434"
  OLLAMA_MODEL: "llama3.1:8b-instruct-q4_K_M"
  LOG_BATCH_SIZE: "1000"
  METRICS_BATCH_SIZE: "500"
  WORKER_CONCURRENCY: "8"
